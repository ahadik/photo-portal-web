# Settings for Backend (on Cloud Run).
# See https://firebase.google.com/docs/app-hosting/configure#cloud-run
runConfig:
  minInstances: 0
  # maxInstances: 100
  # concurrency: 80
  # cpu: 1
  # memoryMiB: 512

# Environment variables and secrets.
env:
  # Configure environment variables.
  # See https://firebase.google.com/docs/app-hosting/configure#user-defined-environment
  - variable: VITE_MEDIA_BUCKET
    value: photo-portal-media
    availability:
      - BUILD
      - RUNTIME

  - variable: VITE_DATA_BUCKET
    value: photo-portal-data
    availability:
      - BUILD
      - RUNTIME

  # Note: VITE_MAPBOX_TOKEN is NOT needed here - Mapbox token is only used server-side
  # in Firebase Functions, not in client-side code. It should be configured as an
  # environment variable for the Functions, not for the frontend build.